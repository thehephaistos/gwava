openapi: 3.1.0
info:
  title: GWOSC API
  version: 2.0.0
  description: REST Public Interface to the Gravitational Wave Open Science Center
    database
paths:
  /api/v2/:
    get:
      operationId: root_retrieve
      description: Example links to all API nodes.
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    type: url
              examples:
                ExampleResponse:
                  value:
                    Runs:
                      Runs: http://127.0.0.1:8000/api/v2/runs
                    Catalogs:
                      Catalogs: http://127.0.0.1:8000/api/v2/catalogs
                    Events:
                      Events: http://127.0.0.1:8000/api/v2/events
                    Event versions:
                      Event versions: http://127.0.0.1:8000/api/v2/event-versions
                    Parameters:
                      Default parameters: http://127.0.0.1:8000/api/v2/default-parameters
                    Segments:
                      Segments for a timeline (e.g. H1_DATA): http://127.0.0.1:8000/api/v2/timelines/H1_DATA/segments
                    Strain Files:
                      Strain Files: http://127.0.0.1:8000/api/v2/strain-files
                  summary: Example Response
          description: ''
  /api/v2/catalogs:
    get:
      operationId: catalogs_list
      description: |-
        Return all event catalogs.

        **Rel URLs:**

        - Follow `detail_url` for a detail view of each catalog.
        - Follow `events_url` for a list of events on each catalog.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - catalogs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCatalogListList'
          description: ''
  /api/v2/catalogs/{name}:
    get:
      operationId: catalogs_retrieve
      description: |-
        Return a specific catalog.

        **Rel URLs:**

        - Follow `events_url` for a list of events on this catalog.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the catalog.
        required: true
      tags:
      - catalogs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogDetail'
          description: ''
  /api/v2/catalogs/{name}/events:
    get:
      operationId: catalogs_events_retrieve
      description: |-
        Return all events from a given catalog.

        **Query parameters:**

        - `include-default-parameters`: if `true` or empty, include a list with the
            preferred values for
            [default parameters](/api/v2/default-parameters).
        - `pagesize=<int>`: Number of results to return per page.

        **Rel URLs:**

        - Follow `parameters_url` for a list of parameter estimations.
        - Follow `timelines_url` for a list of timelines and segments.
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: query
        name: include-default-parameters
        schema:
          type: boolean
        description: Use `?include-default-parameters` or `?include-default-parameters=true`to
          include a list of the preferred default parameters for each event.If omitted,
          defaults to false.
      - in: path
        name: name
        schema:
          type: string
        description: The name of the catalog.
        required: true
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: A page number within the paginated result set.
      - in: query
        name: pagesize
        schema:
          type: integer
          default: 20
        description: Number of results to return per page.
      tags:
      - catalogs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v2/datasets/{name}/strain-files:
    get:
      operationId: datasets_strain_files_list
      description: |-
        Return strain file list.

        **Query parameters:**

        - `start=<int>`: Initial GPS time of the desired GPS interval.
        - `stop=<int>`: Final GPS time of the desired GPS interval.
        - `detector=<str>`: e.g. H1, L1, V1, etc.
        - `sample-rate=<int>`: 4 or 16 [kHz]
        - `pagesize=<int>`: Number of results to return per page.

        **Rel URLs:**

        - Download hdf5 file format from `hdf5_url` rel url.
        - Download gwf file format from `gwf_url` rel url.
        - Follow `detail_url` for more information of the strain file, including bit sums and strain statistics.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - datasets
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTileListList'
          description: ''
  /api/v2/default-parameters:
    get:
      operationId: default_parameters_retrieve
      description: |-
        Return the list of parameters on the column headers
        of any of the [event tables](/eventapi/html/allevents/).

        These parameters are almost always estimated in any analysis
        and can be used to filter results in the [/event-versions](/api/v2/event-versions) endpoint.

        **Example:**

        Constrain the values for `mass-2-source` to be between 3 and 5 solar masses:

        [/event-versions?min-mass-2-source=3&max-mass-2-source=5](/api/v2/event-versions?min-mass-2-source=3&max-mass-2-source=5)
      tags:
      - default-parameters
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                ExampleResponse:
                  value:
                  - mass-1-source
                  - mass-2-source
                  - network-matched-filter-snr
                  - luminosity-distance
                  - chi-eff
                  - total-mass-source
                  - chirp-mass-source
                  - chirp-mass
                  - redshift
                  - far
                  - p-astro
                  - final-mass-source
                  - gps-time
                  summary: Example Response
          description: ''
  /api/v2/event-versions:
    get:
      operationId: event_versions_retrieve
      description: |-
        Return all event versions

        **Query Parameters**

        - `name-contains=<string>`
        - `release=<cat1>[,<cat2>]`
        - `min-<param-name>=<value>`
        - `max-<param-name>=<value>`
        - `lastver=<bool>`: if `true` or empty,
          include only the last version of each event on the list.
          Defaults to false.
        - `include-default-parameters`: if `true` or empty, include a list with the
          preferred values for
          [default parameters](/api/v2/default-parameters).
        - `pagesize=<int>`: Number of results to return per page.

        Find the full list of allowed parameter `<param-name>`s in the [/default-parameters/](/api/v2/default-parameters) endpoint.

        **Example:**

        [/event-versions?max-mass-1-source=3](/api/v2/event-versions?max-mass-1-source=3)
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v2/event-versions/{name}:
    get:
      operationId: event_versions_retrieve_2
      description: |-
        Return a specific version of an event.

        **Query parameters:**

        - `include-default-parameters`: if `true` or empty, include a list with the
            preferred values for
            [default parameters](/api/v2/default-parameters).

        **Rel URLs:**

        - Follow `parameters_url` for a list of parameter estimations.
        - Follow `timelines_url` for a list of timelines and segments.
        - Follow `strain_files_url` for a list of strain file links.
      parameters:
      - in: query
        name: include-default-parameters
        schema:
          type: boolean
        description: Use `?include-default-parameters` or `?include-default-parameters=true`to
          include a list of the preferred default parameters for each event.If omitted,
          defaults to false.
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventVersionDetail'
          description: ''
  /api/v2/event-versions/{name}/dataset:
    get:
      operationId: event_versions_dataset_retrieve
      description: Return the dataset for a given event version.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TileDataset'
          description: ''
  /api/v2/event-versions/{name}/default-parameters:
    get:
      operationId: event_versions_default_parameters_list
      description: Return the default parameters for an event version.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedParameterList'
          description: ''
  /api/v2/event-versions/{name}/parameters:
    get:
      operationId: event_versions_parameters_list
      description: |-
        Return the full list of all parameter estimations
        from all pipelines for an event version.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedParameterSetList'
          description: ''
  /api/v2/event-versions/{name}/strain-files:
    get:
      operationId: event_versions_strain_files_list
      description: |-
        Return strain-file early releases for a specific event version.

        **Query parameters:**

        - `detector=<str>`: e.g. H1, L1, V1, etc.
        - `sample-rate=<int>`: 4 or 16 [kHz]
        - `duration=<int>`: 32 or 4096 [s]
        - `file-format=<str>`: One of {`hdf5`, `gwf`, `txt`}

        **Rel URLs:**

        - Download the corresponding file from the `download_url` field.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedERTileListList'
          description: ''
  /api/v2/event-versions/{name}/timelines:
    get:
      operationId: event_versions_timelines_list
      description: |-
        Return the timelines for a given event version.

        **Rel URLs:**

        - Follow `segments_url` on each timeline for the segment list.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: timeline_name
        schema:
          type: string
        description: The name of the timeline, e.g. H1_DATA.
        required: true
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTimelineList'
          description: ''
  /api/v2/event-versions/{name}/timelines/{timeline_name}:
    get:
      operationId: event_versions_timelines_retrieve
      description: |-
        Return a specific timeline for a given event version.

        **Rel URLs:**

        - Follow `segments_url` for the segment list.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      - in: path
        name: timeline_name
        schema:
          type: string
        description: The name of the timeline, e.g. H1_DATA.
        required: true
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Timeline'
          description: ''
  /api/v2/event-versions/{name}/timelines/{timeline_name}/segments:
    get:
      operationId: event_versions_timelines_segments_list
      description: |-
        Return the segments for a given timeline for an event version.

        **Query parameters**:

        - `start=<int>`: Initial GPS time of the desired GPS interval.
        - `stop=<int>`: Final GPS time of the desired GPS interval.
        - `compact`: Return a list of segment [start, stop] list.
        - `pagesize=<int>`: Number of results to return per page.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the event in the form `GWYYMMDD` or one of its aliases
          like `GWYYMMDD_HHMMSS`, etc. To specify a version use `GWYYMMDD-v{N}`, to
          specify a catalog use `GWYYMMDD@{catalog}`.If no version of catalog is provided
          it will return the latest version available.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: timeline_name
        schema:
          type: string
        required: true
      tags:
      - event-versions
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v2/events:
    get:
      operationId: events_list
      description: |-
        Return all past public events.

        Each event may have more than one version in the `versions` key.
        Each version correspond to a different parameter estimation analysis
        and typically belong to different catalogs.

        **Rel URLs:**

        - Follow `detail_url` inside each version for a detail view of the event version and its parameters.
        - Follow `strain_files_url` for a list of strain files.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - events
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventListList'
          description: ''
  /api/v2/events/{name}:
    get:
      operationId: events_retrieve
      description: |-
        Return a specific event.

        Each event may have more than one version in the `versions` key.
        Each version correspond to a different parameter estimation analysis
        and typically belong to different catalogs.

        **Rel URLs:**

        - Follow `detail_url` inside each version for a detail view of the event version and its parameters.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name (or alias) of the event.
        required: true
      tags:
      - events
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
          description: ''
  /api/v2/events/{name}/strain-files:
    get:
      operationId: events_strain_files_list
      description: |-
        Return strain file list.

        **Query parameters:**

        - `start=<int>`: Initial GPS time of the desired GPS interval.
        - `stop=<int>`: Final GPS time of the desired GPS interval.
        - `detector=<str>`: e.g. H1, L1, V1, etc.
        - `sample-rate=<int>`: 4 or 16 [kHz]
        - `pagesize=<int>`: Number of results to return per page.

        **Rel URLs:**

        - Download hdf5 file format from `hdf5_url` rel url.
        - Download gwf file format from `gwf_url` rel url.
        - Follow `detail_url` for more information of the strain file, including bit sums and strain statistics.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - events
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTileListList'
          description: ''
  /api/v2/runs:
    get:
      operationId: runs_list
      description: |-
        Return past science and observation runs.

        **Rel URLs:**

        - Follow `detail_url` for datasets, events and timelines.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - runs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRunListList'
          description: ''
  /api/v2/runs/{name}:
    get:
      operationId: runs_retrieve
      description: |-
        Return a specific past observation run.

        **Rel URLs:**

        - Follow `datasets_url` for a list of datasets.
        - Follow `events_url` for a list of events discovered on each run.
        - Follow `timelines_url` for a list of timelines and their segment list.
        - Follow `strain_files_url` for a list of strain files.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the run, e.g. O1.
        required: true
      tags:
      - runs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDetail'
          description: ''
  /api/v2/runs/{name}/datasets:
    get:
      operationId: runs_datasets_list
      description: Return datasets for a given run.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - runs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTileDatasetList'
          description: ''
  /api/v2/runs/{name}/events:
    get:
      operationId: runs_events_list
      description: |-
        Return all events from a given run.

        Each event may have more than one version in the `versions` key.
        Each version correspond to a different parameter estimation analysis
        and typically belong to different catalogs.

        **Rel URLs:**

        - Follow `detail_url` inside each version for a detail view of the event version and its parameters.
      parameters:
      - in: path
        name: name
        schema:
          type: string
        description: The name of the run, e.g. O1.
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: pagesize
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - runs
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventListList'
          description: ''
  /api/v2/runs/{name}/strain-files:
    get:
      operationId: runs_strain_files_list
      description: |-
        Return strain file list.

        **Query parameters:**

        - `start=<int>`: Initial GPS time of the desired GPS interval.
